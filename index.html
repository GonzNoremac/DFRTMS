<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VehicleDMS</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-hex">⬡</span>
      <div>
        <div class="login-title">VehicleDMS</div>
        <div class="login-sub">Used Vehicle Department</div>
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@dealership.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <div id="login-error" class="login-error hidden"></div>
    <button class="btn-login" id="login-btn">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="topnav">
    <div class="nav-brand">
      <span class="logo-hex sm">⬡</span>
      <span class="nav-brand-name">VehicleDMS</span>
    </div>
    <nav class="nav-links">
      <a class="nav-link active" data-page="dashboard">Dashboard</a>
      <a class="nav-link" data-page="purchases">Purchases</a>
      <a class="nav-link" data-page="calendar">Calendar</a>
      <a class="nav-link" data-page="auction">Auction</a>
      <a class="nav-link" data-page="archives">Archives</a>
      <a class="nav-link" data-page="reports">Reports</a>
    </nav>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-tools" id="btn-tools">⚙ Tools</button>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>
  </header>
  <main id="page-content"></main>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- ES Module entry point — loads firebase + all pages -->
<script type="module" src="js/app.js?v=1778874892"></script>
  <div id="tools-overlay" class="cal-modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
    <div class="cal-modal" style="width:560px">
      <div class="cal-modal-header">
        <div class="cal-modal-title">⚙ Tools</div>
        <button class="cal-modal-close" onclick="document.getElementById('tools-overlay').classList.add('hidden')">✕</button>
      </div>
      <div class="cal-modal-body" id="tools-modal-body"></div>
    </div>
  </div>
</body>
</html>
